<!DOCTYPE html>
<html lang="pt">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Surpresa Especial</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<audio id="spinSound" src="assets/roleta.mpeg" preload="auto"></audio>
<audio id="winMusic" src="assets/marina.mpeg" preload="auto"></audio>

<div class="stage-lights" id="stageLights"></div>

<div class="particles"></div>

<div class="container">

<h1 class="title">
⚠️ Atenção Melissa...
<br><br>
Existe um botão aqui capaz de causar:
<br>
gritos • pulos • lágrimas
<br><br>
Você tem coragem de apertar? 
</h1>

<div class="wheel-container">

<div class="pointer"></div>

<canvas id="wheel" width="520" height="520"></canvas>

<button id="spinBtn">
GIRAR ROLETA
</button>

</div>

<p id="status"></p>

</div>

<div id="modal" class="modal">

<div class="modal-content">

<button class="close-modal" onclick="closeModal()">✕</button>

<div class="modal-header">

<img class="artist" src="assets/marina.webp">

<img id="premioImagem" src="assets/premio.jpeg" class="premio-img">

</div>

<h2>
VOCÊ GANHOU
<br>
INGRESSOS PARA O
<br>
SHOW DA MARINA SENA
</h2>

<div class="ticket">
🎟️ SHOW MARINA SENA
<br>
31 DE MAIO — PORTUGAL
</div>

<p class="subtitle">
Prepare-se para uma noite inesquecível 💜
</p>

<button onclick="resgatarPremio()">RESGATAR PRÊMIO</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
